<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2090ea" />
    <meta name="color-scheme" content="dark light" />

    <title>QxChat</title>
    <meta
      name="description"
      content="A realtime messenger for QxProtocol rooms with chat, voice, reactions, link previews, and local backups."
    />
    <meta name="application-name" content="QxChat" />
    <meta name="apple-mobile-web-app-title" content="QxChat" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QxProtocol" />
    <meta property="og:title" content="QxProtocol Messenger" />
    <meta
      property="og:description"
      content="Realtime rooms for private chat, voice, reactions, previews, and lightweight backups."
    />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="/social-card.png" />
    <meta property="og:image:secure_url" content="/social-card.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="QxProtocol Messenger social card showing realtime secure rooms."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="QxProtocol Messenger" />
    <meta
      name="twitter:description"
      content="Realtime rooms for private chat, voice, reactions, previews, and lightweight backups."
    />
    <meta name="twitter:image" content="/social-card.png" />
    <meta
      name="twitter:image:alt"
      content="QxProtocol Messenger social card showing realtime secure rooms."
    />
    <script src="%BASE_URL%runtime-config.js"></script>

    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1b1b1d;
        transition: opacity 300ms ease, visibility 300ms ease;
      }
      #splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash__card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        user-select: none;
      }
      .splash__logo {
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .splash__logo img,
      .splash__logo svg {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }
      .splash__ring {
        animation: splash-ring 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        transform-origin: center;
      }
      @keyframes splash-ring {
        0%   { stroke-dashoffset: 138; transform: rotate(-90deg); }
        50%  { stroke-dashoffset: 0;   transform: rotate(90deg);  }
        100% { stroke-dashoffset: 138; transform: rotate(270deg); }
      }
      .splash__name {
        margin: 0;
        color: #f4f4f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .splash__dots {
        display: flex;
        gap: 7px;
      }
      .splash__dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #2090ea;
        opacity: 0.3;
        animation: splash-dot 1.2s ease-in-out infinite;
      }
      .splash__dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash__dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splash-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
        40%            { opacity: 1;   transform: scale(1.2);  }
      }
      @media (max-width: 480px) {
        .splash__logo { width: 64px; height: 64px; }
        .splash__name { font-size: 19px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="splash" role="status" aria-label="Loading QxChat">
      <div class="splash__card">
        <div class="splash__logo" aria-hidden="true">
          <img src="/favicon.svg" alt="" />
        </div>
        <p class="splash__name">QxChat</p>
        <div class="splash__dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
